<!DOCTYPE html>
<html>
<head>
    <title>Debug Days Off API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .error { background-color: #ffebee; }
        .success { background-color: #e8f5e8; }
        .info { background-color: #e3f2fd; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Debug Days Off API</h1>
    
    <div class="section info">
        <h3>Authentication Status</h3>
        <p>Access Token: <span id="tokenStatus">Checking...</span></p>
        <p>User Role: <span id="roleStatus">Checking...</span></p>
        <button onclick="checkAuth()">Check Authentication</button>
    </div>

    <div class="section">
        <h3>API Tests</h3>
        <button onclick="testHealthCheck()">Test Health Check</button>
        <button onclick="testCurrentUser()">Test Current User</button>
        <button onclick="testDaysOff()">Test Days Off API</button>
        <button onclick="testCreateDayOff()">Test Create Day Off</button>
    </div>

    <div class="section">
        <h3>Results</h3>
        <div id="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `section ${type}`;
            div.innerHTML = `<pre>${message}</pre>`;
            results.appendChild(div);
            console.log(message);
        }

        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const role = localStorage.getItem('role');
            
            document.getElementById('tokenStatus').textContent = token ? 'Present' : 'Missing';
            document.getElementById('roleStatus').textContent = role || 'Not set';
            
            log(`Token: ${token ? 'Present' : 'Missing'}\nRole: ${role || 'Not set'}`);
        }

        async function makeRequest(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(url, {
                    ...options,
                    headers
                });
                
                const data = await response.json();
                return { status: response.status, data, ok: response.ok };
            } catch (error) {
                return { status: 0, error: error.message, ok: false };
            }
        }

        async function testHealthCheck() {
            log('Testing health check...', 'info');
            const result = await makeRequest(`${API_BASE}/health`);
            log(`Health Check Result:\nStatus: ${result.status}\nData: ${JSON.stringify(result.data, null, 2)}`, 
                result.ok ? 'success' : 'error');
        }

        async function testCurrentUser() {
            log('Testing current user...', 'info');
            const result = await makeRequest(`${API_BASE}/auth/me`);
            log(`Current User Result:\nStatus: ${result.status}\nData: ${JSON.stringify(result.data, null, 2)}`, 
                result.ok ? 'success' : 'error');
        }

        async function testDaysOff() {
            log('Testing days off API...', 'info');
            const today = new Date().toISOString().split('T')[0];
            const futureDate = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            const url = `${API_BASE}/api/days-off/?start_date=${today}&end_date=${futureDate}`;
            const result = await makeRequest(url);
            log(`Days Off Result:\nURL: ${url}\nStatus: ${result.status}\nData: ${JSON.stringify(result.data, null, 2)}`, 
                result.ok ? 'success' : 'error');
        }

        async function testCreateDayOff() {
            log('Testing create day off...', 'info');
            const tomorrow = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            const result = await makeRequest(`${API_BASE}/api/days-off/`, {
                method: 'POST',
                body: JSON.stringify({
                    date: tomorrow,
                    reason: 'Test day off',
                    is_recurring: false
                })
            });
            
            log(`Create Day Off Result:\nStatus: ${result.status}\nData: ${JSON.stringify(result.data, null, 2)}`, 
                result.ok ? 'success' : 'error');
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
